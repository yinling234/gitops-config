apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
  - path: ingress-patch.yaml
images:
  - name: 192.168.30.11:30002/library/myapp
    newTag: latest
configMapGenerator:
  - name: myapp-config
    behavior: merge
    literals:
      - app_env=development
      - log_level=debug

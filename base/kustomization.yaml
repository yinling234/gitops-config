apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - pdb.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml
commonLabels:
  app.kubernetes.io/name: myapp
  app.kubernetes.io/version: v1.0.0
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
